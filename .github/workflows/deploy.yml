name: Deploy to Test Server
   
on:
  push:
    branches:
      - staging

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get Code
      uses: actions/checkout@v2

    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./src/     # Content of src/ will be copied to the server
        server-dir: /www/vijabei/test/  # Insert your FTP path here
        dangerous-clean-slate: false
        exclude: |
          **/downloads/**
          **/feedback/**
          **/legacy/**
          **/logs/**
          **/*.log
          **/clickcounter-*.txt
          **/collection_logs.txt
          **/user_interactions.log
          google*.html
          **/*.zip